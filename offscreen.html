    let audio = null;
    let playCount = 0;
    let playInterval = null;

    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.action === 'playAlarm') {
        console.log('Received playAlarm message');
        playAlarmSound();
        sendResponse({ success: true });
      }
      return true;
    });

    function playAlarmSound() {
      console.log('Playing alarm sound...');
      playCount = 0;
      
      // Clear any existing interval
      if (playInterval) {
        clearInterval(playInterval);
      }

      // Try Web Audio API first
      try {
        const audioContext = new AudioContext();
        
        // Resume audio context (required for Chrome)
        audioContext.resume().then(() => {
          playBeepPattern(audioContext);
        });

        function playBeepPattern(ctx) {
          const now = ctx.currentTime;
          
          // Create a loud beep pattern
          for (let i = 0; i < 5; i++) {
            createBeep(ctx, 800, now + i * 0.2, 0.15);
          }
          createBeep(ctx, 1000, now + 1, 0.3);
        }

        function createBeep(ctx, frequency, startTime, duration) {
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          oscillator.frequency.value = frequency;
          oscillator.type = 'square';
          
          gainNode.gain.setValueAtTime(0.8, startTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
          
          oscillator.start(startTime);
          oscillator.stop(startTime + duration);
        }

        // Repeat pattern
        playInterval = setInterval(() => {
          playCount++;
          if (playCount >= 10) {
            clearInterval(playInterval);
            return;
          }
          playBeepPattern(audioContext);
        }, 1500);

        console.log('Web Audio API playing');
      } catch (error) {
        console.error('Web Audio API failed:', error);
        
        // Fallback to HTML Audio
        try {
          audio = new Audio(audioDataUri);
          audio.volume = 1.0;
          audio.play().then(() => {
            console.log('HTML Audio playing');
          }).catch(e => {
            console.error('HTML Audio failed:', e);
          });
          
          // Repeat
          playInterval = setInterval(() => {
            playCount++;
            if (playCount >= 10) {
              clearInterval(playInterval);
              return;
            }
            audio.currentTime = 0;
            audio.play().catch(e => console.error('Repeat play failed:', e));
          }, 1500);
        } catch (audioError) {
          console.error('All audio methods failed:', audioError);
        }
      }
    }

    console.log('Offscreen document loaded and ready');
  </script>
