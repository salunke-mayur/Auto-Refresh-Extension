<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auto Refresh - Audio</title>
</head>
<body>
  <script>
    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.action === 'playAlarm') {
        playAlarmSound();
        sendResponse({ success: true });
      }
      return true;
    });

    function playAlarmSound() {
      const audioContext = new AudioContext();

      function playBeep(frequency, startTime, duration, volume = 0.7) {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = frequency;
        oscillator.type = 'square';

        gainNode.gain.setValueAtTime(volume, startTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
      }

      function playAlarmPattern() {
        const now = audioContext.currentTime;
        // Urgent siren pattern
        playBeep(880, now, 0.15, 0.7);
        playBeep(660, now + 0.15, 0.15, 0.7);
        playBeep(880, now + 0.3, 0.15, 0.7);
        playBeep(660, now + 0.45, 0.15, 0.7);
        playBeep(1100, now + 0.6, 0.3, 0.8);
      }

      // Play immediately
      playAlarmPattern();

      // Repeat 10 times over 15 seconds
      let count = 0;
      const interval = setInterval(() => {
        count++;
        if (count >= 10) {
          clearInterval(interval);
          return;
        }
        playAlarmPattern();
      }, 1500);
    }
  </script>
</body>
</html>
