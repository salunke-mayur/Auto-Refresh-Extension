<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" ry="24" fill="#0F766E"/>
  <!-- Clock face -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="white" stroke-width="6"/>
  <!-- Clock hands -->
  <line x1="64" y1="64" x2="64" y2="42" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="80" y2="72" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="white"/>
  <!-- Circular refresh arrow around clock -->
  <path d="M64 16 A48 48 0 1 1 22 84"
    fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-dasharray="6 4"/>
  <!-- Arrowhead -->
  <polygon points="10,68 26,90 40,72" fill="white"/>
</svg>
