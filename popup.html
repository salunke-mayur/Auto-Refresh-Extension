<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-width: 300px; color: #fff; }
    .container { padding: 16px; }
    h1 { text-align: center; font-size: 18px; margin-bottom: 16px; color: #00d4ff; }
  </style>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Auto Refresh</h1>

    <div class="status-container">
      <span class="status-label">Status:</span>
      <span id="status" class="status-off">OFF</span>
    </div>

    <div class="input-group">
      <label for="interval">Refresh Interval (seconds)</label>
      <input type="number" id="interval" min="1" max="3600" value="30">
    </div>

    <div class="input-group">
      <label for="searchText">Alert if text is missing (optional)</label>
      <input type="text" id="searchText" placeholder="Enter text to monitor">
    </div>

    <div class="notification-options">
      <label class="section-label">Notification Types</label>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="notifSound" checked>
          <span class="checkmark"></span>
          🔊 Sound
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="notifPopup" checked>
          <span class="checkmark"></span>
          💬 Popup
        </label>
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
    </div>

    <div class="info">
      <p id="nextRefresh"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
