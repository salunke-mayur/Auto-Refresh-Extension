<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Auto Refresh</h1>

    <div class="status-container">
      <span class="status-label">Status:</span>
      <span id="status" class="status-off">OFF</span>
    </div>

    <div class="input-group">
      <label for="interval">Refresh Interval (seconds)</label>
      <input type="number" id="interval" min="1" max="3600" value="30" placeholder="Enter seconds">
    </div>

    <div class="input-group">
      <label for="searchText">Alert if text is missing (optional)</label>
      <input type="text" id="searchText" placeholder="Enter text to monitor">
      <span class="input-hint">Get notified if this text disappears from the page</span>
    </div>

    <div class="notification-options">
      <label class="section-label">Notification Types</label>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="notifSound" checked>
          <span class="checkmark"></span>
          🔊 Alarm Sound
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="notifPopup" checked>
          <span class="checkmark"></span>
          💬 System Notification
        </label>
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
    </div>

    <button id="stopAlarmBtn" class="btn btn-alarm" style="display: none;">
      🔇 Stop Alarm
    </button>

    <div class="info">
      <p id="nextRefresh"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
