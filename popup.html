<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auto Refresh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e2e; color: #fff; width: 280px; padding: 16px; }
    h1 { font-size: 16px; text-align: center; margin-bottom: 12px; color: #89b4fa; }
    .row { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #a6adc8; margin-bottom: 4px; }
    input[type="number"], input[type="text"] { width: 100%; padding: 8px; border: 1px solid #45475a; border-radius: 6px; background: #313244; color: #fff; font-size: 14px; }
    input:focus { outline: none; border-color: #89b4fa; }
    .status { text-align: center; padding: 6px; background: #313244; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }
    .status.on { background: #a6e3a1; color: #1e1e2e; }
    .status.off { background: #f38ba8; color: #1e1e2e; }
    .checks { display: flex; gap: 12px; margin-bottom: 12px; }
    .check { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
    .check input { width: 16px; height: 16px; cursor: pointer; }
    .btns { display: flex; gap: 8px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .start { background: #a6e3a1; color: #1e1e2e; }
    .stop { background: #f38ba8; color: #1e1e2e; }
    .info { text-align: center; font-size: 11px; color: #a6adc8; margin-top: 10px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>⟳ Auto Refresh</h1>
  <div class="status off" id="status">OFF</div>
  
  <div class="row">
    <label>Interval (seconds)</label>
    <input type="number" id="interval" value="30" min="1" max="3600">
  </div>
  
  <div class="row">
    <label>Alert if text missing</label>
    <input type="text" id="text" placeholder="Optional">
  </div>
  
  <div class="checks">
    <label class="check"><input type="checkbox" id="sound" checked> 🔊 Sound</label>
    <label class="check"><input type="checkbox" id="popup" checked> 💬 Popup</label>
  </div>
  
  <div class="btns">
    <button class="start" id="startBtn">Start</button>
    <button class="stop" id="stopBtn" disabled>Stop</button>
  </div>
  
  <div class="info" id="info"></div>

  <script>
    const $ = id => document.getElementById(id);
    let tabId, timer;

    chrome.tabs.query({active: true, currentWindow: true}, tabs => {
      tabId = tabs[0].id;
      chrome.storage.local.get([`refresh_${tabId}`], data => {
        const d = data[`refresh_${tabId}`];
        if (d?.isActive) {
          $('status').textContent = 'ON';
          $('status').className = 'status on';
          $('interval').value = d.interval;
          $('interval').disabled = true;
          $('text').value = d.searchText || '';
          $('text').disabled = true;
          $('sound').checked = d.notificationPrefs?.sound !== false;
          $('popup').checked = d.notificationPrefs?.popup !== false;
          $('sound').disabled = $('popup').disabled = true;
          $('startBtn').disabled = true;
          $('stopBtn').disabled = false;
          countdown(d.nextRefresh);
        }
      });
    });

    function countdown(next) {
      clearInterval(timer);
      const tick = () => {
        const s = Math.max(0, Math.ceil((next - Date.now()) / 1000));
        $('info').textContent = s > 0 ? `Refreshing in ${s}s` : 'Refreshing...';
      };
      tick();
      timer = setInterval(tick, 1000);
    }

    $('startBtn').onclick = () => {
      const interval = parseInt($('interval').value);
      if (isNaN(interval) || interval < 1 || interval > 3600) {
        alert('Enter 1-3600 seconds');
        return;
      }
      chrome.runtime.sendMessage({
        action: 'start',
        tabId,
        interval,
        searchText: $('text').value.trim(),
        notificationPrefs: { sound: $('sound').checked, popup: $('popup').checked }
      });
      window.close();
    };

    $('stopBtn').onclick = () => {
      chrome.runtime.sendMessage({ action: 'stop', tabId });
      window.close();
    };
  </script>
</body>
</html>
