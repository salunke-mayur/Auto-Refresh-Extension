<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Auto Refresh</h1>

    <div class="status-container">
      <span class="status-label">Status:</span>
      <span id="status" class="status-off">OFF</span>
    </div>

    <div class="input-group">
      <label for="interval">Refresh Interval (seconds)</label>
      <input type="number" id="interval" min="1" max="3600" value="30" placeholder="Enter seconds">
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
    </div>

    <div class="info">
      <p id="nextRefresh"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
